<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMNIVERSE</title>

<style>

/* ===== BODY ===== */
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(180deg,#eaf2ff,#f7faff);
  color:#1a2a4f;
  padding-top:70px;
}

/* ===== HEADER ===== */
.top-header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#dbeafe;
  z-index:3000;
}

.menu-btn{
  font-size:20px;
  cursor:pointer;
}

.account{
  font-size:22px;
  cursor:pointer;
}

/* ===== SIDEBAR ===== */
.sidebar{
  position:fixed;
  top:0;
  left:-280px;
  width:280px;
  height:100%;
  background:#0b1a35;
  padding:30px 20px;
  transition:0.3s ease;
  z-index:2000;
  box-shadow:5px 0 25px rgba(0,0,0,0.4);
}

.sidebar.active{
  left:0;
}

.sidebar h2{
  color:white;
  margin-bottom:20px;
}

.sidebar a{
  display:block;
  color:#cbd5e1;
  text-decoration:none;
  padding:12px 0;
  font-size:16px;
  transition:0.2s;
}

.sidebar a:hover{
  color:#60a5fa;
  padding-left:8px;
}

/* ===== OVERLAY ===== */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(3px);
  opacity:0;
  visibility:hidden;
  transition:0.3s;
  z-index:1500;
}

.overlay.active{
  opacity:1;
  visibility:visible;
}

/* ===== HERO ===== */
.hero{
  text-align:center;
  padding:30px 20px 20px;
}

.hero h1{
  font-size:28px;
  margin:0;
}

.hero p{
  margin-top:8px;
  font-size:14px;
  opacity:0.7;
}

/* ===== NAVBAR ===== */
.navbar{
  display:flex;
  justify-content:space-evenly;
  align-items:center;
  padding:15px 0;
}

.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:13px;
  color:#2c3e70;
  text-align:center;
}

.nav-item span{
  font-size:22px;
  margin-bottom:4px;
}

.nav-item:hover{
  transform:translateY(-2px);
  opacity:0.8;
}

/* ===== SECTION ===== */
.section{
  padding:20px;
}

.section h3{
  margin-bottom:15px;
}

/* ===== GRID ===== */
.novel-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

.cover{
